name: Daily Rebuild for Scheduled Posts

on:
  schedule:
    # Rebuild every day at 04:05 UTC (05:05 Paris winter / 06:05 Paris summer)
    - cron: '5 4 * * *'
    # Backup rebuild at 04:30 UTC
    - cron: '30 4 * * *'
  repository_dispatch:
    types: [daily-rebuild]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Astro excludes future-dated posts at build time (see src/lib/posts.ts);
      # this scheduled rebuild publishes them once their date is reached.
      - name: Build with Astro
        env:
          TZ: Europe/Paris
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
