<div style="display: flex; align-items: center; width: 100%; padding: 10px;">
    <span></span>
    <span class="likebtn-wrapper"
          data-theme="custom"
          data-btn_size="25"
          data-f_size="14"
          data-icon_size="17"
          data-icon_l="hrt6"
          data-lang="fr"
          data-ef_voting="heartbeat"
          data-identifier=""
          data-dislike_enabled="false"
          data-icon_dislike_show="false"></span>
</div>

<script>
    (function(d, e, s) {
        // Mettre à jour dynamiquement data-identifier avec la partie de l'URL après le domaine
        const currentURL = window.location.href;
        const urlAfterDomain = new URL(currentURL).pathname + new URL(currentURL).search;

        // Optionnel : retirer le slash initial
        const dataIdentifier = urlAfterDomain.startsWith("/") ? urlAfterDomain.substring(1) : urlAfterDomain;

        // Sélectionner l'élément LikeBtn et mettre à jour son data-identifier
        const likeBtnWrapper = d.querySelector('.likebtn-wrapper');
        if (likeBtnWrapper) {
            likeBtnWrapper.setAttribute('data-identifier', dataIdentifier);
        }

        // Charger le script LikeBtn
        if (d.getElementById("likebtn_wjs")) return;
        const a = d.createElement(e);
        const m = d.getElementsByTagName(e)[0];
        a.async = 1;
        a.id = "likebtn_wjs";
        a.src = s;
        m.parentNode.insertBefore(a, m);
    })(document, "script", "//w.likebtn.com/js/w/widget.js");
</script>
