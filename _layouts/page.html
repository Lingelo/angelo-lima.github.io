---
layout: base
---

<main class="page-main">
  <div class="page-container">
    {% if page.title %}
    <header class="page-header">
      <h1 class="page-title">{{ page.title | strip_html }}</h1>
      {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle | strip_html }}</p>
      {% endif %}
    </header>
    {% endif %}

    <div class="page-content">
      {{ content }}
    </div>
  </div>
</main>
